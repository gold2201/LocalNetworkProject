services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-network_db}
      POSTGRES_USER: ${DB_USER:-network_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-network_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-network_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-network_db}
      DB_USER: ${DB_USER:-network_user}
      DB_PASSWORD: ${DB_PASSWORD:-network_password}
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: network_project.settings
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "
        echo '⏳ Ожидание готовности базы данных...' &&
        python manage.py migrate &&
        echo '🚀 Запуск Django...' &&
        python manage.py runserver 0.0.0.0:8000
      "
    restart: on-failure:3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: app-network-${COMPOSE_PROJECT_NAME:-default}

volumes:
  postgres_data:
    name: postgres_data_${COMPOSE_PROJECT_NAME:-default}